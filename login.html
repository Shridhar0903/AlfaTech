<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AlfaTech</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Segoe UI;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#041f71,#0b3c5d);
    }

    .login-container{
      width:360px;
      background:#fff;
      padding:40px 30px;
      border-radius:10px;
      box-shadow:0 20px 40px rgba(0,0,0,0.2);
      text-align:center;
    }

    .login-container h2{
      margin-bottom:25px;
      color:#041f71;
    }

    .input-box{
      width:100%;
      margin-bottom:18px;
      text-align:left;
    }

    .input-box label{
      font-size:14px;
      color:#333;
      display:block;
      margin-bottom:6px;
    }

    .input-box input{
      width:100%;
      padding:10px;
      border:1px solid #ccc;
      border-radius:6px;
      outline:none;
      transition:0.3s;
    }

    .input-box input:focus{
      border-color:#041f71;
      box-shadow:0 0 5px rgba(4,31,113,0.3);
    }

    .login-btn{
      width:100%;
      padding:12px;
      background:#041f71;
      color:#fff;
      border:none;
      border-radius:6px;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
    }

    .login-btn:hover{
      background:#0b3c5d;
    }

    .extra{
      margin-top:15px;
      font-size:14px;
    }

    .extra a{
      color:#041f71;
      text-decoration:none;
      font-weight:500;
    }

    .extra a:hover{
      text-decoration:underline;
    }

  </style>
</head>

<body>

  <div class="login-container">
    <h2>Login</h2>

    <form>
      <div class="input-box">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-box">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="extra">
      <p>Don't have an account? <a href="#">Sign Up</a></p>
    </div>
  </div>

</body>
</html>
